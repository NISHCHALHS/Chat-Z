<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>

/* Center whole page */
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;

    background:
        radial-gradient(circle at 30% 30%, #0b123eb2, transparent 65%),
        linear-gradient(
            135deg,
            rgba(93, 50, 142, 0.97),
            rgba(22, 14, 32, 0.952)
        );
}

/* Medium Login Box */
fieldset{
    width:370px;
    padding:60px;
    height:330px;
    border:none;

    background:rgba(255, 255, 255, 0.925);
    box-shadow:0 15px 40px rgba(0,0,0,0.3);

    display:flex;
    flex-direction:column;
    gap:20px;
    border-radius:29px;
    border:3px solid rgb(0, 6, 17);
}

/* Label + Input container */
.username1,
.password1{
    display:flex;
    flex-direction:column;
    gap:15px;
    color: rgba(0, 0, 0, 0.858);
}

/* Wrapper for input + sticker */
.input-wrapper{
    position: relative;
}

/* Space for icon */
.input-wrapper input{
    width:80%;
    padding:12px 45px 12px 15px;
    border-radius:18px;
    border:2px solid #4b6a34;
    font-size:15px;
    outline:none;
    transition:0.3s ease;
}

/* Sticker styling */
.icon{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    font-size:18px;
    opacity:0.6;
    transition:0.3s;
    pointer-events:none;
}

/* Glow on focus */
.input-wrapper input:focus{
    border-color:#764ba2;
    box-shadow:0 0 12px rgba(118,75,162,0.4);
}

/* Animate sticker on focus */
.input-wrapper input:focus + .icon{
    transform:translateY(-50%) scale(1.2);
    opacity:1;
}

/* Gradient label */
label{
    font-size:23px;
    font-weight:350;
    color:#3c1d5b;
    text-shadow:0 0 8px rgba(106, 156, 96, 0.5);
}

/* Input styling */
input{
    padding:12px 15px;
    border-radius:18px;
    border:2px solid #4b6a34;
    font-size:15px;
    outline:none;
    transition: all 0.3s ease;
    background: rgba(255,255,255,0.9);
}

/* Hover effect */
input:hover{
    border-color:#764ba2;
}

/* Focus effect */
input:focus{
    border-color:#764ba2;
    box-shadow:0 0 12px rgba(118,75,162,0.4);
    transform: scale(1.03);
}

.login{
    display:flex;
    justify-content:center;
    margin-top:17px;
}

.login1{
    padding:14px 35px;
    border:none;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
    font-weight:600;

    background: linear-gradient(45deg,#2b2f77,#50176bb6);
    color:white;

    box-shadow:0 8px 25px rgba(127,0,255,0.35);
    transition: all 0.3s ease;
}

/* Button hover */
.login1:hover{
    transform: translateY(-4px) scale(1.05);
    background: linear-gradient(45deg,#040a3bc1,#a04dc6d3);
    box-shadow:0 8px 25px rgba(127,0,255,0.4);
}

.forgot-container{
    display:flex;
    justify-content:flex-end;
    margin-top:5px;
    padding:3px;
}

.forgot-link{
    text-decoration:none;
    font-weight:bold;
    background: linear-gradient(45deg, #667eea, #764ba2);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    transition:0.3s;
    font-size:17px;
}

</style>
</head>

<body>

<fieldset>

<div class="username1">
<label><b>User name :</b></label>
<div class="input-wrapper">
<input type="text" id="username">
<span class="icon">👤</span>
</div>
</div>

<div class="password1">
<label><b>Password :</b></label>
<div class="input-wrapper">
<input type="password" id="password">
<span class="icon">🔐</span>
</div>
</div>

<div class="forgot-container">
<a href="forgotpassword.html" class="forgot-link">Forgot Password?</a>
</div>

<div class="login">
<button class="login1" onclick="login()">Continue</button>
</div>

</fieldset>

</body>

<script>
  
 async function login(){

const email = document.getElementById("username").value;
const password = document.getElementById("password").value;

const res = await fetch("/auth/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email,
password
})
});

const data = await res.json();

if(data.message === "Login successful"){
alert("Login successful");
window.location.href="chat.html";
}else{
alert(data.message);
}

}
</script>

<script>
if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("service-worker.js")
.then(()=>console.log("Service Worker Registered"));
}
</script>
