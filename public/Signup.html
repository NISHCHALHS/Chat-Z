<style>
body{

/* Inputs */
input{
    padding:12px;
    border-radius:15px;
    border:2px solid #060606;

input:focus{

button{

button:hover{

     }

 #step2 input[type="email"]{

width:120px;

 .password-wrapper{

.password-wrapper input{

<body>
  <form onsubmit="event.preventDefault(); signup();"> 
<fieldset class="signup-box">
 <p id="create">Create Account</p>

<!-- STEP 1 -->
<div class="step active" id="step1">
    <input type="text" id="username" placeholder="Username">
    <input type="text" placeholder="Enter your Last Name" required>

    <input type="text" placeholder="Date of Birth" 
       onfocus="this.type='date'" 
       onblur="if(!this.value)this.type='text'">
       
    <input type="email" id="email" placeholder="Email (Optional)">
    <button type="button" onclick="nextStep(1)">Next</button>

<!-- STEP 2 -->
 <div class="step" id="step2">

<div class="otp-row">
<input type="tel" id="mobile" placeholder="Mobile Number"

pattern="[0-9]{10}" maxlength="10" required>

<button type="button" id="sendBtn" onclick="sendOTP()">Send OTP</button>
</div>

 <p id="otpTimer" style="font-size:17px;color:#764ba2;font-weight:bold;text-align: right;"></p>

<input type="text" id="otpInput" placeholder="Enter OTP" disabled required>

 

<div class="btn-group">
<button type="button" oncli ick="prevStep(2)">Back</button>
<button type="button" onclick="verifyOTP()">Next</button>
</div>

</div>

<!-- STEP 3 -->
<div class="step" id="step3">

    <div class="password-wrapper">
        <input type="password" id="password" placeholder="Password" oninput="checkStrength()" required>
        <span class="toggle" onclick="togglePassword('password')"></span>

    <div class="strength-bar" id="strengthBar"></div>
    <div class="strength-text" id="strengthText"></div>

    <input type="password" id="confirmPassword" placeholder="Confirm Password" required>

            <input type="file" accept="image/*" onchange="previewImage(event)">

    </div>

<div id="cropModal" style="

<img id="cropImage" style="max-width:100%;">

<br><br>
<button onclick="cropImage()">Crop & Save</button>

</div>
</div>

 
<script>
let cropper;
let generatedOTP;
let timerInterval;
let otpVerified = false;


/* Step Navigation */
function nextStep(step){
    document.getElementById("step"+step).classList.remove("active");
    document.getElementById("step"+(step+1)).classList.add("active");
}

function prevStep(step){
    document.getElementById("step"+step).classList.remove("active");
    document.getElementById("step"+(step-1)).classList.add("active");
}

/* OTP SEND */
function sendOTP(){
    const mobile = document.getElementById("mobile").value;
    const otpInput = document.getElementById("otpInput");
    const sendBtn = document.getElementById("sendBtn");

    if(mobile.length !== 10){
        alert("Enter valid 10 digit mobile number");
        return;
    }

    generatedOTP = Math.floor(1000 + Math.random() * 9000);
    alert("Demo OTP: " + generatedOTP);

    otpInput.disabled = false;
    sendBtn.disabled = true;

    startTimer();
}

/* OTP TIMER */
 function startTimer(){
    const timer = document.getElementById("otpTimer");
    let countdown = 4;

    clearInterval(timerInterval);

    timer.style.cursor = "default";

    timerInterval = setInterval(()=>{
        timer.innerHTML = "Resend OTP in " + countdown + " sec";
        countdown--;

        if(countdown < 0){
            clearInterval(timerInterval);

            timer.innerHTML = "Resend OTP";
            timer.style.cursor = "pointer";
            timer.style.textAlign="right";
            timer.style.marginTop="10px";
            timer.style.marginBottom="10px";
            timer.onclick = resendOTP;
        }

    },1000);
}
function resendOTP(){
    generatedOTP = Math.floor(1000 + Math.random() * 9000);

    alert("New OTP: " + generatedOTP);

    startTimer();
}

/* OTP VERIFY */
function verifyOTP(){
    const otpValue = document.getElementById("otpInput").value;

    if(otpValue == generatedOTP){
        otpVerified = true;
        alert("OTP Verified Successfully");
        nextStep(2);
    }else{
        alert("Invalid OTP");
    }
}

/* Profile Crop */
function previewImage(event){
    const reader = new FileReader();
    reader.onload = function(){
        const cropImage = document.getElementById("cropImage");
        cropImage.src = reader.result;
        document.getElementById("cropModal").style.display = "flex";

        cropper = new Cropper(cropImage,{
            aspectRatio:1,
            viewMode:1
        });
    }
    reader.readAsDataURL(event.target.files[0]);
}

function cropImage(){
    const canvas = cropper.getCroppedCanvas({
        width:200,
        height:200
    });
    

    document.getElementById("preview").src = canvas.toDataURL();
    cropper.destroy();
    document.getElementById("cropModal").style.display = "none";
}

/* Password Toggle */
function togglePassword(id){
    const input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
}

/* Password Strength */
function checkStrength(){
    const pass = document.getElementById("password").value;
    const bar = document.getElementById("strengthBar");
    const text = document.getElementById("strengthText");

    let strength = 0;

    if(pass.length >= 8) strength++;
    if(/[A-Z]/.test(pass)) strength++;
    if(/[0-9]/.test(pass)) strength++;
    if(/[@$!%*?&]/.test(pass)) strength++;

    const colors = ["", "red", "orange", "blue", "green"];
    const labels = ["", "Weak", "Medium", "Strong", "Very Strong"];

    bar.style.width = (strength*25)+"%";
    bar.style.background = colors[strength];
    text.innerHTML = labels[strength];
    text.style.color = colors[strength];
}

/* Final Submit */
function signup(e){
    e.preventDefault();

    const pass = document.getElementById("password").value;
    const confirm = document.getElementById("confirmPassword").value;
    const message = document.getElementById("message");

    if(!otpVerified){
        message.innerHTML="Please verify OTP first!";
        message.className="message error";
        return;
    }

    if(pass !== confirm){
        message.innerHTML="Passwords do not match!";
        message.className="message error";
        return;
    }

    message.innerHTML="Account Created Successfully!";
    message.className="message success";
}
