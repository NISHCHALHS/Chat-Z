<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css"/>
<meta charset="UTF-8">
<title>Forgot Password - ChatZ</title>

<style>
body{
    margin:0;
    height: 100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#090f3af7,#2e032f);
    color:white;
}
 html, body{
    margin:0;
    padding:0;
    height:100%;
    overflow:hidden; 
}
/* Card */
.container{
    width:400px;
    padding:40px;
    border-radius:25px;
      background:
        radial-gradient(circle at 30% 30%, #0b123e90, transparent 65%),
        linear-gradient(
            135deg,
            rgba(27, 32, 108, 0.681),
            rgba(112, 63, 161, 0.516)
        );
    display:flex;
    flex-direction:column;
    gap:25px;
}

/* Steps hidden */
.step{ display:none; flex-direction:column; gap:15px;  }
.active{ display:flex; }

input{
    width:100%;
    padding:15px;
    border-radius:12px;
    border:none;
    outline:none;
    font-size:15px;
    box-sizing:border-box;
}

 button{
    width:90%;
    margin:15px auto;
    display:block;
    padding:15px;
    border:none;
    border-radius:30px;
    background:linear-gradient(45deg,#667eea,#764ba2);
    color:white;
    font-weight:bold;
    font-size: 18px;
    cursor:pointer;
    transition:.3s;
}
button:hover{ transform:scale(1.05); }

/* OTP */
.otp-container{
    display:flex;
    justify-content:center;
    gap:10px;
}
.otp-box{
    width:48px;
    height:55px;
    text-align:center;
    font-size:22px;
    border-radius:10px;
    border:none;
}
.password-wrapper{
    position:relative;
    width:90%;
    margin:0 auto;
}
 
.toggle{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
}

/* Strength bar */
.strength{
    height:6px;
    border-radius:5px;
    background:#ccc;
    width:0%;
    margin-top:5px;
    transition:.3s;
}

.message{
    text-align:center;
    font-size:14px;
}
.success{ color:#00ff9d;font-size: 20px; }
.error{ color:#ff4d4d; 
font-size: 20px;}

.timer{
    text-align:center;
    font-size:18px;
    opacity:0.8;
}
.iti{
    width:90%;
    margin: 0 auto;
}
#reset-password{
    margin-left: 20px;
}
h2{
   font-size: 30px; 
}

</style>
</head>

<body>

<div class="container">

<h2 style="text-align:center;">Forgot Password</h2>

<!-- STEP 1 -->
<div id="step1" class="step active">
<input type="tel" id="phone" placeholder="Enter Mobile Number">
<button onclick="sendOTP()">Send OTP</button>
</div>

<!-- STEP 2 -->
<div id="step2" class="step">
<div class="otp-container">
<input class="otp-box" maxlength="1" oninput="moveNext(this,0)">
<input class="otp-box" maxlength="1" oninput="moveNext(this,1)">
<input class="otp-box" maxlength="1" oninput="moveNext(this,2)">
<input class="otp-box" maxlength="1" oninput="moveNext(this,3)">
</div>
<div class="timer" id="timer"></div>
<button onclick="verifyOTP()">Verify OTP</button>
</div>

<!-- STEP 3 -->
<div id="step3" class="step">
<div class="password-wrapper">
<input type="password" id="newPass" placeholder="New Password" oninput="checkStrength()">
<span class="toggle" onclick="togglePassword('newPass')">👁</span>
<div id="strengthBar" class="strength"></div>
</div>

<div class="password-wrapper">
<input type="password" id="confirmPass" placeholder="Confirm Password">
<span class="toggle" onclick="togglePassword('confirmPass')">👁</span>
</div>

<button  id="reset-password" onclick="resetPassword()">Submit</button>
</div>

<p id="message" class="message"></p>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script>
<script>
const phoneInput = document.querySelector("#phone");

const iti = window.intlTelInput(phoneInput, {
    initialCountry: "in",   // default India
    preferredCountries: ["in", "us", "gb"],
    separateDialCode: true,
    utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/utils.js"
});

phoneInput.addEventListener("focus", function(){
    let message=document.getElementById("message");
    message.innerHTML="";
    message.className="message";
});

phoneInput.addEventListener("input", function(){
    let message=document.getElementById("message");
    message.innerHTML="";
    message.className="message";
});
phoneInput.addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        e.preventDefault();   // stop default behaviour
        sendOTP();            // move to next step
    }
});
</script>


<script>

let generatedOTP="";
let countdown=60;
let timerInterval;

 function sendOTP(){
    let message=document.getElementById("message");

    if(!iti.isValidNumber()){
        message.innerHTML="Invalid number!";
        message.className="message error";
        return;
    }

    message.innerHTML=""; // clear if valid
    message.className="message";

    let fullNumber=iti.getNumber();
    generatedOTP=Math.floor(1000+Math.random()*9000);

    alert("Demo OTP sent to "+fullNumber+"\nOTP: "+generatedOTP);

    document.getElementById("step1").classList.remove("active");
    document.getElementById("step2").classList.add("active");

    startTimer();
}
function startTimer(){
    let timer = document.getElementById("timer");
    countdown = 60;

    timerInterval = setInterval(()=>{
        timer.innerHTML = "Resend OTP in " + countdown + " sec";
        countdown--;

        if(countdown < 0){
            clearInterval(timerInterval);
            timer.innerHTML = "🔄 You can resend OTP";
            timer.classList.add("resend-style");  // add class instead
        }
    },1000);
}
function moveNext(current,index){
    let boxes=document.getElementsByClassName("otp-box");
    if(current.value && index<3) boxes[index+1].focus();
}

function verifyOTP(){
    let boxes=document.getElementsByClassName("otp-box");
    let entered="";
    for(let b of boxes) entered+=b.value;

    let message=document.getElementById("message");

    if(entered==generatedOTP){
        message.innerHTML="OTP Verified!";
        message.className="message success";
        document.getElementById("step2").classList.remove("active");
        document.getElementById("step3").classList.add("active");
    }else{
        message.innerHTML="Invalid OTP!";
        message.className="message error";
    }
}

function togglePassword(id){
    let pass=document.getElementById(id);
    pass.type=pass.type==="password"?"text":"password";
}

function checkStrength(){
    let pass=document.getElementById("newPass").value;
    let bar=document.getElementById("strengthBar");

    if(pass.length<4){
        bar.style.width="30%";
        bar.style.background="red";
    }else if(pass.length<8){
        bar.style.width="60%";
        bar.style.background="orange";
    }else{
        bar.style.width="100%";
        bar.style.background="green";
    }
}

function resetPassword(){
    let newPass=document.getElementById("newPass").value;
    let confirmPass=document.getElementById("confirmPass").value;
    let message=document.getElementById("message");

    if(newPass!==confirmPass){
        message.innerHTML="Passwords do not match!";
        message.className="message error";
        return;
    }

    message.innerHTML="Password Reset Successful!";
    message.className="message success";

    setTimeout(()=>window.location.href="login.html",3000);
}

</script>

</body>
</html>
